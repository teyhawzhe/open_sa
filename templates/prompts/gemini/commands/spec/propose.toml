description = "整理 SA Spec 需求草稿"
prompt = """
將本次指令視為 `spec:propose {{args}}`。

請先讀取並遵守目前工作區的：
- `AGENTS.md`
- `skills/system-analysis/SKILL.md`
- `rules/spec.md`
- `rules/risk.md`
- `rules/history.md`
- `rules/file-style.md`
- `project/system-spec.md`
- `project/index.md`

整理需求草稿。若資訊不足，先列待確認問題，不要建立未確認的業務規則。

輸出需包含：需求目標、角色或使用者、流程、資料、驗收條件、待確認事項、初步風險評估。`spec:propose` 主要是整理草稿；若未被要求套用，不要直接改寫 `project/` 文件。
"""
